services:
  reconchain:
    build: .
    container_name: reconchain
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "1.0"
    volumes:
      - ./out:/data/out
    entrypoint: ["python3", "/opt/reconchain/reconchain.py"]
    command: ["--help"]
